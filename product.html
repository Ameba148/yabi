<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yabi - Produkt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Yabi</a>
        <ul class="nav-links">
            <li><a href="index.html"><span data-i18n="nav_home">Hlavní</span></a></li>
            <li><a href="product.html"><span data-i18n="nav_product">Produkt</span></a></li>
            <li><a href="cart.html"><span data-i18n="nav_cart">Košík</span> <span class="cart-count">0</span></a></li>
            <li><a href="contact.html"><span data-i18n="nav_contact">Kontakt</span></a></li>
        </ul>
    </header>

    <div class="container">
        <div class="product-detail">
            <img src="images/tshirt.jpg" alt="Tričko">
            <div class="detail-info">
                <h1>Klasické tričko</h1>
                <p class="detail-price" data-i18n="price" data-i18n-params='{"price":1500}'>1500 Kč</p>
                <p class="detail-description" data-i18n="product_description">Toto tričko z přírodního bavlny vám poskytne pohodlí po celý den. Dostupná velikosti S, M, L, XL. Barvy: bílá, černá, šedá.</p>
                <button class="btn" onclick="addCurrentProduct()">
                    <i class="fas fa-shopping-cart"></i> <span data-i18n="add_to_cart">Přidat do košíku</span>
                </button>
                <a href="index.html" class="btn btn-outline" style="margin-left: 1rem;" data-i18n="back_to_shop">Zpět do obchodu</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 Yabi. Všechna práva vyhrazena.</p>
    </footer>

    <script src="script.js"></script>
    <script src="i18n.js"></script>
</body>
</html>
