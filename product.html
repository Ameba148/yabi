<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар - Мой магазин</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">My<span>Shop</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="product.html">Товар</a></li>
            <li><a href="cart.html">Корзина</a></li>
            <li><a href="contact.html">Контакты</a></li>
        </ul>
    </header>

    <div class="container">
        <div class="product-detail">
            <img src="https://via.placeholder.com/600x800?text=Футболка" alt="Футболка">
            <div class="detail-info">
                <h1>Классическая футболка</h1>
                <p class="detail-price">1 500 ₽</p>
                <p class="detail-description">
                    Эта футболка из натурального хлопка подарит вам комфорт в течение всего дня.
                    Доступна в размерах S, M, L, XL. Цвет: белый, чёрный, серый.
                </p>
                <button class="btn" onclick="alert('Товар добавлен в корзину (демо)')">
                    <i class="fas fa-shopping-cart"></i> Добавить в корзину
                </button>
                <a href="index.html" class="btn btn-outline" style="margin-left: 1rem;">Назад к покупкам</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 MyShop. Все права защищены.</p>
    </footer>
