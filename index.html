<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yabi - oblečení</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Yabi</a>
        <ul class="nav-links">
            <li><a href="index.html"><span data-i18n="nav_home">Hlavní</span></a></li>
            <li><a href="product.html"><span data-i18n="nav_product">Produkt</span></a></li>
            <li><a href="cart.html"><span data-i18n="nav_cart">Košík</span> <span class="cart-count">0</span></a></li>
            <li><a href="contact.html"><span data-i18n="nav_contact">Kontakt</span></a></li>
        </ul>
    </header>

    <div class="container">
        <h1 data-i18n="new_arrivals">Novinky</h1>
        <div class="product-grid">
            <!-- Карточка товара 1 -->
            <div class="product-card">
                <img src="images/tshirt.jpg" alt="Tričko">
                <div class="product-info">
                    <h3>Klasické tričko</h3>
                    <p class="price" data-i18n="price" data-i18n-params='{"price":1500}'>1500 Kč</p>
                    <a href="product.html" class="btn" data-i18n="product_detail">Detail</a>
                    <button class="btn add-to-cart" data-i18n="add_to_cart">Přidat do košíku</button>
                </div>
            </div>
            <!-- Карточка товара 2 -->
            <div class="product-card">
                <img src="images/jeans.jpg" alt="Džíny">
                <div class="product-info">
                    <h3>Pohodlné džíny</h3>
                    <p class="price" data-i18n="price" data-i18n-params='{"price":3200}'>3200 Kč</p>
                    <a href="product.html" class="btn" data-i18n="product_detail">Detail</a>
                    <button class="btn add-to-cart" data-i18n="add_to_cart">Přidat do košíku</button>
                </div>
            </div>
            <!-- Карточка товара 3 -->
            <div class="product-card">
                <img src="images/jacket.jpg" alt="Bunda">
                <div class="product-info">
                    <h3>Stylová bunda</h3>
                    <p class="price" data-i18n="price" data-i18n-params='{"price":5500}'>5500 Kč</p>
                    <a href="product.html" class="btn" data-i18n="product_detail">Detail</a>
                    <button class="btn add-to-cart" data-i18n="add_to_cart">Přidat do košíku</button>
                </div>
            </div>
            <!-- Карточка товара 4 -->
            <div class="product-card">
                <img src="images/sneakers.jpg" alt="Boty">
                <div class="product-info">
                    <h3>Moderní tenisky</h3>
                    <p class="price" data-i18n="price" data-i18n-params='{"price":4200}'>4200 Kč</p>
                    <a href="product.html" class="btn" data-i18n="product_detail">Detail</a>
                    <button class="btn add-to-cart" data-i18n="add_to_cart">Přidat do košíku</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 Yabi. Všechna práva vyhrazena.</p>
    </footer>

    <script src="script.js"></script>
    <script src="i18n.js"></script>
</body>
</html>
